name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Neutralize Windows-only .npmrc on Linux
        run: |
          if [ -f .npmrc ]; then
            sed -i.bak '/^script-shell=/d' .npmrc
          fi
          npm config set script-shell /usr/bin/bash --location=project

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Supabase integration tests (requires secrets)
        # Note: secrets are not available on PRs from forks.
        if: ${{ secrets.VITE_SUPABASE_URL != '' && secrets.VITE_SUPABASE_ANON_KEY != '' && secrets.SUPABASE_TEST_EMAIL != '' && secrets.SUPABASE_TEST_PASSWORD != '' }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_TEST_EMAIL: ${{ secrets.SUPABASE_TEST_EMAIL }}
          SUPABASE_TEST_PASSWORD: ${{ secrets.SUPABASE_TEST_PASSWORD }}
          SUPABASE_REQUIRE_REALTIME: "true"
        run: npm run test:supabase
